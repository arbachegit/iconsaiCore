version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd apps/web && npm install --legacy-peer-deps
    build:
      commands:
        - cd apps/web && npm run build
  artifacts:
    baseDirectory: apps/web/.next
    files:
      - '**/*'
  cache:
    paths:
      - apps/web/node_modules/**/*
